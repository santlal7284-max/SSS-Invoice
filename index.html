<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sant Sales & Service — Invoice</title>
<meta name="theme-color" content="#12253F">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#12253F; --navy-light:#1B3355; --navy-pale:#EDF1F6;
  --amber:#F0A93B; --amber-dark:#C8862A;
  --bg:#EDF1F6; --surface:#FFFFFF; --border:#D7DEE6;
  --text:#16233A; --text-dim:#5C6B7A;
  --green:#1E8E5A; --red:#C23B3B;
  --radius:10px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; height:100%;}
h1,h2,h3,.display{font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:0.01em;}
.mono{font-family:'JetBrains Mono',monospace;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit; font-size:15px;}

#app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; background:var(--bg); position:relative;}

/* Top bar */
.topbar{background:var(--navy); color:#fff; padding:14px 16px 12px; position:sticky; top:0; z-index:20;}
.topbar .eyebrow{font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--amber); font-weight:600;}
.topbar h1{margin:2px 0 0; font-size:24px; line-height:1;}
.topbar .stripe{height:3px; background:linear-gradient(90deg,var(--amber),transparent); margin-top:10px; border-radius:2px;}

/* Views */
.view{display:none; flex:1; padding:14px 14px 90px; overflow-y:auto;}
.view.active{display:block;}

.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:12px;}
.card h3{margin:0 0 10px; font-size:19px; color:var(--navy);}

.field{margin-bottom:10px;}
.field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.03em;}
.field input, .field select{width:100%; padding:9px 10px; border:1.5px solid var(--border); border-radius:7px; background:#fff; color:var(--text);}
.field input:focus, .field select:focus{outline:none; border-color:var(--amber);}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

/* search */
.searchbar{display:flex; gap:8px; margin-bottom:10px;}
.searchbar input{flex:1; padding:11px 12px; border-radius:8px; border:1.5px solid var(--border); background:#fff;}
.searchbar select{padding:11px 8px; border-radius:8px; border:1.5px solid var(--border); background:#fff; max-width:130px;}

.result-count{font-size:12px; color:var(--text-dim); margin:2px 2px 8px;}

/* price master list */
.part-row{background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:10px 12px; margin-bottom:8px;}
.part-row .top{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
.part-code{font-size:12px; color:var(--amber-dark); font-weight:700;}
.part-cat{font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.04em;}
.part-desc{font-size:14.5px; font-weight:600; margin:3px 0 8px; color:var(--text);}
.part-prices{display:flex; align-items:center; gap:10px; font-size:13px;}
.part-prices .lbl{color:var(--text-dim); font-size:11px;}
.price-input{width:80px; padding:6px 7px; border:1.5px solid var(--border); border-radius:6px; text-align:right;}
.price-input.overridden{border-color:var(--amber); background:#FFF8EC;}
.revert-btn{background:none; border:none; color:var(--text-dim); font-size:16px; padding:2px 4px;}
.landing-note{font-size:11px; color:var(--text-dim); margin-left:auto;}

.loadmore{width:100%; padding:11px; border:1.5px dashed var(--border); background:transparent; border-radius:9px; color:var(--navy); font-weight:600;}

/* buttons */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:11px 16px; border-radius:8px; border:none; font-weight:700; font-size:14.5px;}
.btn-primary{background:var(--navy); color:#fff;}
.btn-amber{background:var(--amber); color:#2B1B00;}
.btn-outline{background:transparent; border:1.5px solid var(--border); color:var(--navy);}
.btn-danger{background:transparent; border:1.5px solid var(--red); color:var(--red);}
.btn-block{width:100%;}
.btn-row{display:flex; gap:8px;}

/* invoice items */
.item-card{border:1px solid var(--border); border-radius:9px; padding:10px; margin-bottom:8px; position:relative; background:#FBFCFD;}
.item-card .idx{position:absolute; top:-9px; left:10px; background:var(--navy); color:#fff; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px;}
.item-card .remove{position:absolute; top:6px; right:8px; background:none; border:none; color:var(--red); font-size:18px; line-height:1;}
.autocomplete{position:relative;}
.ac-list{position:absolute; z-index:30; left:0; right:0; top:100%; background:#fff; border:1.5px solid var(--border); border-radius:8px; max-height:220px; overflow-y:auto; box-shadow:0 8px 24px rgba(18,37,63,0.18); margin-top:3px;}
.ac-item{padding:9px 10px; border-bottom:1px solid var(--border); font-size:13.5px;}
.ac-item:last-child{border-bottom:none;}
.ac-item .c{font-size:11px; color:var(--amber-dark); font-weight:700;}
.item-grid{display:grid; grid-template-columns:1fr 70px 90px; gap:8px; margin-top:8px;}
.item-grid label{font-size:10px; color:var(--text-dim); text-transform:uppercase;}
.item-line-total{text-align:right; font-size:13px; color:var(--text-dim); margin-top:6px;}
.item-line-total b{color:var(--text); font-size:14.5px;}

/* totals */
.totals{border-top:2px solid var(--navy); margin-top:10px; padding-top:10px;}
.totals .r{display:flex; justify-content:space-between; font-size:14px; padding:3px 0;}
.totals .grand{font-size:20px; font-weight:700; color:var(--navy); border-top:1px dashed var(--border); margin-top:6px; padding-top:8px;}

/* bottom nav */
.tabbar{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px; background:var(--navy); display:flex; z-index:40; padding:6px 4px calc(6px + env(safe-area-inset-bottom)); box-shadow:0 -4px 16px rgba(0,0,0,0.15);}
.tab{flex:1; background:none; border:none; color:#9FB1C7; padding:8px 4px 6px; font-size:11px; font-weight:600; display:flex; flex-direction:column; align-items:center; gap:3px; border-radius:8px;}
.tab .ic{font-size:19px;}
.tab.active{color:var(--amber);}

.empty{text-align:center; padding:40px 20px; color:var(--text-dim);}
.empty .ic{font-size:38px; margin-bottom:8px;}

.badge{display:inline-block; background:var(--amber); color:#2B1B00; font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px;}

/* invoice preview / print */
.paper{background:#fff; border:1px solid var(--border); border-radius:6px; padding:16px; font-size:12.5px;}
.paper .ph{text-align:center; font-family:'Barlow Condensed'; font-weight:700; font-size:15px; letter-spacing:0.08em; border-bottom:2px solid var(--navy); padding-bottom:8px; margin-bottom:8px;}
.paper table{width:100%; border-collapse:collapse; margin:8px 0; font-size:11.5px;}
.paper th, .paper td{border:1px solid #999; padding:4px 5px; text-align:left;}
.paper th{background:var(--navy-pale);}
.paper .num{text-align:right;}
.paper .totalrow td{font-weight:700;}

.toast{position:fixed; bottom:78px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:10px 18px; border-radius:30px; font-size:13.5px; font-weight:600; z-index:60; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

.hist-row{background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:12px; margin-bottom:8px;}
.hist-row .top{display:flex; justify-content:space-between; font-weight:700; color:var(--navy);}
.hist-row .sub{font-size:12px; color:var(--text-dim); margin-top:2px;}
.hist-row .amt{font-size:17px; font-weight:700; margin-top:6px;}
.hist-actions{display:flex; gap:6px; margin-top:8px;}
.hist-actions button{flex:1; padding:7px; font-size:12.5px; border-radius:6px;}
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="eyebrow" id="topEyebrow">SPARE PARTS &amp; BILLING</div>
    <h1 id="topTitle">Price Master</h1>
    <div class="stripe"></div>
  </div>

  <!-- PRICE MASTER -->
  <div class="view active" id="view-master">
    <div class="searchbar">
      <input type="text" id="searchInput" placeholder="Search part code or description…">
      <select id="categoryFilter"><option value="">All Categories</option></select>
    </div>
    <div class="result-count" id="resultCount"></div>
    <div id="partList"></div>
    <button class="loadmore" id="loadMoreBtn" style="display:none;">Show more</button>
    <button class="btn btn-outline btn-block" style="margin-top:10px;" id="addPartBtn">+ Add New Part</button>
  </div>

  <!-- NEW INVOICE -->
  <div class="view" id="view-invoice">
    <div class="card">
      <h3>Billing To</h3>
      <div class="field"><label>Customer / Company Name</label><input id="buyerName" placeholder="e.g. Venus Home Appliances Pvt. Ltd."></div>
      <div class="field"><label>Address</label><input id="buyerAddress" placeholder="Address"></div>
      <div class="row2">
        <div class="field"><label>GSTIN</label><input id="buyerGstin" placeholder="07AABCXXXXXP1ZD"></div>
        <div class="field"><label>State Code</label><input id="buyerState" placeholder="07" maxlength="2"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Invoice No.</label><input id="invoiceNo"></div>
        <div class="field"><label>Date</label><input id="invoiceDate" type="date"></div>
      </div>
    </div>

    <div class="card">
      <h3>Items</h3>
      <div id="itemsContainer"></div>
      <button class="btn btn-outline btn-block" id="addItemBtn">+ Add Item</button>
    </div>

    <div class="card">
      <div class="field"><label>Discount %</label><input id="invoiceDiscount" type="number" step="0.01" min="0" max="100" placeholder="0"></div>
      <div class="totals" id="invoiceTotals"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-outline" style="flex:1" id="printInvoiceBtn">⬇ Download PDF</button>
      <button class="btn btn-outline" style="flex:1" id="shareInvoiceBtn">📤 Share</button>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn btn-primary btn-block" id="saveInvoiceBtn">Save Invoice</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="view" id="view-history">
    <div id="historyList"></div>
  </div>

  <!-- SETTINGS -->
  <div class="view" id="view-settings">
    <div class="card">
      <h3>Company Details</h3>
      <div class="field"><label>Company Name</label><input id="setCompanyName"></div>
      <div class="field"><label>Address</label><input id="setAddress"></div>
      <div class="row2">
        <div class="field"><label>Contact No.</label><input id="setContact"></div>
        <div class="field"><label>Email</label><input id="setEmail"></div>
      </div>
      <div class="row2">
        <div class="field"><label>GSTIN</label><input id="setGstin"></div>
        <div class="field"><label>State Code</label><input id="setState" maxlength="2"></div>
      </div>
      <div class="row2">
        <div class="field"><label>PAN No.</label><input id="setPan"></div>
        <div class="field"><label>GST Rate (%)</label><input id="setGstRate" type="number"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Invoice Prefix</label><input id="setPrefix" placeholder="SSS/07/TM/"></div>
        <div class="field"><label>Next Invoice No.</label><input id="setNextNum" type="number"></div>
      </div>
      <button class="btn btn-primary btn-block" id="saveSettingsBtn">Save Settings</button>
    </div>

    <div class="card">
      <h3>Authorised Signature</h3>
      <p style="font-size:13px; color:var(--text-dim); margin-top:0;">Upload your signature photo — it will automatically appear at the bottom of every invoice.</p>
      <div id="signaturePreviewBox" style="display:none; margin-bottom:10px; text-align:center; border:1.5px dashed var(--border); border-radius:8px; padding:10px;">
        <img id="signaturePreviewImg" style="max-height:70px; max-width:100%;">
      </div>
      <div class="btn-row">
        <button class="btn btn-outline" style="flex:1" id="uploadSignBtn">📷 Upload Signature</button>
        <button class="btn btn-danger" style="flex:1" id="removeSignBtn">Remove</button>
      </div>
      <input type="file" id="signFile" accept="image/*" style="display:none;">
    </div>

    <div class="card">
      <h3>Data Backup</h3>
      <p style="font-size:13px; color:var(--text-dim); margin-top:0;">Backup or restore your price edits, invoices, and settings.</p>
      <div class="btn-row">
        <button class="btn btn-outline" style="flex:1" id="exportBtn">⬇ Export</button>
        <button class="btn btn-outline" style="flex:1" id="importBtn">⬆ Import</button>
      </div>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
    </div>
  </div>

  <div class="tabbar">
    <button class="tab active" data-view="master"><span class="ic">🔧</span>Price Master</button>
    <button class="tab" data-view="invoice"><span class="ic">🧾</span>New Invoice</button>
    <button class="tab" data-view="history"><span class="ic">📋</span>History</button>
    <button class="tab" data-view="settings"><span class="ic">⚙️</span>Settings</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

/* ===================== Combined part list ===================== */
function allParts(){
  // returns array of {code,hsn,cat,desc,fbasic,cbasic}
  const base = PRICE_DATA.map(r => {
    const ov = overrides[r[0]];
    return { code:r[0], hsn:r[1], cat:r[2], desc:r[3], fbasic: ov?ov.fbasic:r[4], cbasic: ov?ov.cbasic:r[5], custom:false, _orig:r };
  });
  const custom = customParts.map(r => ({ code:r[0], hsn:r[1], cat:r[2], desc:r[3], fbasic:r[4], cbasic:r[5], custom:true }));
  return custom.concat(base);
}
let PARTS_CACHE = allParts();
function refreshParts(){ PARTS_CACHE = allParts(); }

function findPart(code){
  if(!code) return null;
  return PARTS_CACHE.find(p => p.code.toLowerCase() === code.toLowerCase()) || null;
}

function esc(str){
  return String(str==null?'':str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const catFilter = document.getElementById('categoryFilter');

let visibleCount = 40;
function norm(str){
  return String(str||'').toLowerCase().replace(/[\s\-_.\/,()]+/g,'');
}
function matchesSearch(p, q, cat){
  if(cat && p.cat !== cat) return false;
  if(!q) return true;
  const nq = norm(q);
  return norm(p.code).includes(nq) || norm(p.desc).includes(nq);
}

function renderPartList(){
  const q = document.getElementById('searchInput').value.trim();
  const cat = catFilter.value;
  const filtered = PARTS_CACHE.filter(p=>matchesSearch(p,q,cat));
  const list = document.getElementById('partList');
  list.innerHTML = '';
  const show = filtered.slice(0, visibleCount);
  document.getElementById('resultCount').textContent = filtered.length + ' parts found' + (filtered.length>show.length ? ' (showing ' + show.length + ')':'');
  show.forEach(p=>{
    const div = document.createElement('div');
    div.className = 'part-row';
    const isOv = !!overrides[p.code];
    div.innerHTML = `
      <div class="top">
        <span class="part-code mono">${esc(p.code)}${p.custom?' <span class=\"badge\">NEW</span>':''}</span>
        <span class="part-cat">${esc(p.cat)}</span>
      </div>
      <div class="part-desc">${esc(p.desc)} <span class="mono" style="color:var(--text-dim); font-weight:400; font-size:11px;">HSN ${esc(p.hsn)}</span></div>
      <div class="part-prices">
        <span class="lbl">Franchisee ₹</span>
        <input type="number" step="0.01" class="price-input ${isOv?'overridden':''}" data-code="${esc(p.code)}" data-field="fbasic" value="${p.fbasic}">
        <span class="lbl">Customer ₹</span>
        <input type="number" step="0.01" class="price-input ${isOv?'overridden':''}" data-code="${esc(p.code)}" data-field="cbasic" value="${p.cbasic}">
        ${(!p.custom && isOv) ? '<button class="revert-btn" data-revert="'+esc(p.code)+'" title="Original rate par wapas jayein">↺</button>' : ''}
      </div>`;
    list.appendChild(div);
  });
  document.getElementById('loadMoreBtn').style.display = filtered.length>show.length ? 'block':'none';
}

let currentItems = []; // {code, desc, hsn, qty, rate, manual}

function newItem(){ return {code:'', desc:'', hsn:'', qty:1, rate:0, manual:false, taxIncl:false}; }

function itemTaxable(it){
  const gstPct = parseFloat(settings.gstRate)||18;
  const amt = (it.qty||0)*(it.rate||0);
  return it.taxIncl ? amt/(1+gstPct/100) : amt;
}

function addItemRow(item){
  currentItems.push(item || newItem());
  renderItems();
}

function computeGst(){
  const seller = (settings.stateCode||'').trim();
  const buyer = (document.getElementById('buyerState').value||'').trim();
  const gstRate = parseFloat(settings.gstRate)||18;
  const intra = seller && buyer && seller === buyer;
  return { intra, cgst: intra?gstRate/2:0, sgst: intra?gstRate/2:0, igst: intra?0:gstRate };
}

function renderItems(){
  const box = document.getElementById('itemsContainer');
  box.innerHTML = '';
  currentItems.forEach((it, idx)=>{

    const div = document.createElement('div');
    div.className = 'item-card';
    div.innerHTML = `
      <span class="idx">#${idx+1}</span>
      <button class="remove" data-remove="${idx}" title="Remove">✕</button>
      <div class="autocomplete">
        <div class="field" style="margin-bottom:6px;">
          <label>Search Part Code / Description (or leave blank to enter manually)</label>
          <input type="text" class="ac-input" data-idx="${idx}" value="${esc(it.code || '')}" placeholder="Type part code or name…" autocomplete="off">
        </div>
        <div class="ac-results" data-idx="${idx}"></div>
      </div>
      <div class="field" style="margin-bottom:0;">
        <label>Description</label>
        <input type="text" class="it-desc" data-idx="${idx}" value="${esc(it.desc || '')}" placeholder="Item description">
      </div>

        <div class="field" style="margin-bottom:0;"><label>HSN/SAC</label><input type="text" class="it-hsn" data-idx="${idx}" value="${esc(it.hsn || '')}"></div>
        <div class="field" style="margin-bottom:0;"><label>Qty</label><input type="number" step="1" min="0" class="it-qty" data-idx="${idx}" value="${it.qty}"></div>
        <div class="field" style="margin-bottom:0;"><label>${it.taxIncl?'Amount (with tax) ₹':'Rate ₹'}</label><input type="number" step="0.01" class="it-rate" data-idx="${idx}" value="${it.rate}"></div>

    ).join('') + '</div>';

function renderTotals(){
  const gst = computeGst();
  let rawTaxable = 0;
  currentItems.forEach(it=>{ rawTaxable += itemTaxable(it); });
  const discountPct = parseFloat(document.getElementById('invoiceDiscount').value)||0;
  const discountAmt = rawTaxable * discountPct / 100;
  const taxable = rawTaxable - discountAmt;
  const cgstAmt = taxable*gst.cgst/100, sgstAmt = taxable*gst.sgst/100, igstAmt = taxable*gst.igst/100;
  const grand = taxable + cgstAmt + sgstAmt + igstAmt;
  const rounded = Math.round(grand);
  const roundOff = rounded - grand;
  const box = document.getElementById('invoiceTotals');
  box.innerHTML = `
    <div class="r"><span>Taxable Value (before discount)</span><span>₹${rawTaxable.toFixed(2)}</span></div>
    ${discountPct>0 ? `<div class="r"><span>Discount @ ${discountPct}%</span><span>−₹${discountAmt.toFixed(2)}</span></div>
    <div class="r"><span>Taxable Value (after discount)</span><span>₹${taxable.toFixed(2)}</span></div>` : ''}
    ${gst.intra ? `<div class="r"><span>CGST @ ${gst.cgst}%</span><span>₹${cgstAmt.toFixed(2)}</span></div>
    <div class="r"><span>SGST @ ${gst.sgst}%</span><span>₹${sgstAmt.toFixed(2)}</span></div>`
    : `<div class="r"><span>IGST @ ${gst.igst}%</span><span>₹${igstAmt.toFixed(2)}</span></div>`}
    <div class="r"><span>Round off</span><span>₹${roundOff.toFixed(2)}</span></div>
    <div class="r grand"><span>Total Invoice Value</span><span>₹${rounded.toFixed(2)}</span></div>
  `;
  return { rawTaxable, discountPct, discountAmt, taxable, cgstAmt, sgstAmt, igstAmt, rounded, gst };
}

    </table>
    <div style="margin-top:20px; display:flex; justify-content:flex-end;">
      <div style="text-align:center;">For ${esc(settings.companyName)}<br>${getSignature() ? '<img src="'+getSignature()+'" style="max-height:55px; max-width:160px; display:block; margin:4px auto;">' : '<br><br><br>'}Authorised Signatory</div>
    </div>
  </div>`;
}

function buildInvoicePdf(inv){
  const html = invoiceHtml(inv);
  let holder = document.getElementById('pdfRenderHolder');
  if(!holder){
    holder = document.createElement('div');
    holder.id = 'pdfRenderHolder';
    holder.style.position = 'fixed';
    holder.style.left = '-9999px';
    holder.style.top = '0';
    holder.style.width = '750px';
    holder.style.background = '#fff';
    document.body.appendChild(holder);
  }
  holder.innerHTML = html;
  return html2canvas(holder, { scale: 2, backgroundColor: '#ffffff' }).then((canvas) => {
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageWidth = 210, pageHeight = 297;
    const margin = 8;
    const usableWidth = pageWidth - margin * 2;
    const imgHeightMM = (canvas.height * usableWidth) / canvas.width;
    let heightLeft = imgHeightMM;
    let position = margin;
    pdf.addImage(imgData, 'JPEG', margin, position, usableWidth, imgHeightMM);
    heightLeft -= (pageHeight - margin * 2);
    while(heightLeft > 0){
      position = heightLeft - imgHeightMM + margin;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', margin, position, usableWidth, imgHeightMM);
      heightLeft -= (pageHeight - margin * 2);
    }
    return pdf;
  });
}

function printInvoice(inv){
  toast('Preparing PDF…');
  buildInvoicePdf(inv).then((pdf) => {
    pdf.save('Invoice-' + (inv.invoiceNo || 'draft') + '.pdf');
  }).catch(() => {
    alert('There was a problem creating the PDF. Please check your internet connection and try again.');
  });
}

function shareInvoice(inv){
  toast('Preparing PDF…');
  buildInvoicePdf(inv).then((pdf) => {
    const blob = pdf.output('blob');
    const fileName = 'Invoice-' + (inv.invoiceNo || 'draft') + '.pdf';
    const file = new File([blob], fileName, { type: 'application/pdf' });
    if(navigator.canShare && navigator.canShare({ files: [file] })){
      navigator.share({
        files: [file],
        title: 'Invoice ' + (inv.invoiceNo || ''),
        text: 'Invoice ' + (inv.invoiceNo || '') + ' - ' + settings.companyName
      }).catch(() => {});
    } else {
      alert('Direct share is not supported on this device. Use "Download PDF" and attach it manually via WhatsApp.');
      pdf.save(fileName);
    }
  }).catch(() => {
    alert('There was a problem creating the PDF. Please check your internet connection and try again.');
  });
}

/* ===================== History view ===================== */
function renderHistory(){
  const box = document.getElementById('historyList');
  if(invoices.length===0){
    box.innerHTML = '<div class="empty"><div class="ic">🧾</div>No invoices saved yet.</div>';
    return;
  }
  box.innerHTML = '';
  invoices.forEach((inv, idx)=>{
    const div = document.createElement('div');
    div.className = 'hist-row';
    div.innerHTML = `
      <div class="top"><span>${esc(inv.invoiceNo)}</span><span>${esc(inv.date)}</span></div>
      <div class="sub">${esc(inv.buyer.name)}</div>
      <div class="amt">₹${fmt(inv.totals.rounded)}</div>
      <div class="hist-actions">
        <button class="btn btn-outline" data-print="${idx}">⬇ PDF</button>
        <button class="btn btn-outline" data-share="${idx}">📤 Share</button>
        <button class="btn btn-danger" data-del="${idx}">Delete</button>
      </div>`;
    box.appendChild(div);
  });
}

document.getElementById('historyList').addEventListener('click', (e)=>{
  const pb = e.target.closest('[data-print]');
  if(pb){ printInvoice(invoices[+pb.dataset.print]); return; }
  const sb = e.target.closest('[data-share]');
  if(sb){ shareInvoice(invoices[+sb.dataset.share]); return; }
  const db = e.target.closest('[data-del]');
  if(db){
    if(confirm('Delete this invoice?')){
      invoices.splice(+db.dataset.del,1);
      LS.set('sss_invoices', invoices);
      renderHistory();
    }
  }
});

/* ===================== Settings view ===================== */
function loadSettingsForm(){
  document.getElementById('setCompanyName').value = settings.companyName;
  document.getElementById('setAddress').value = settings.address;
  document.getElementById('setContact').value = settings.contact;
  document.getElementById('setEmail').value = settings.email;
  document.getElementById('setGstin').value = settings.gstin;
  document.getElementById('setState').value = settings.stateCode;
  document.getElementById('setPan').value = settings.pan;
  document.getElementById('setGstRate').value = settings.gstRate;
  document.getElementById('setPrefix').value = settings.prefix;
  document.getElementById('setNextNum').value = settings.nextNum;
  updateSignaturePreview();
}

function updateSignaturePreview(){
  const box = document.getElementById('signaturePreviewBox');
  const img = document.getElementById('signaturePreviewImg');
  const sig = getSignature();
  if(sig){
    img.src = sig;
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }
}

document.getElementById('uploadSignBtn').addEventListener('click', ()=>document.getElementById('signFile').click());
document.getElementById('signFile').addEventListener('change', (e)=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    settings.signatureImage = ev.target.result;
    LS.set('sss_settings', settings);
    updateSignaturePreview();
    toast('Signature saved');
  };
  reader.readAsDataURL(file);
});

document.getElementById('removeSignBtn').addEventListener('click', ()=>{
  settings.signatureImage = '';
  LS.set('sss_settings', settings);
  updateSignaturePreview();
  toast('Signature removed');
});

document.getElementById('saveSettingsBtn').addEventListener('click', ()=>{
  settings = {
    companyName: document.getElementById('setCompanyName').value,
    address: document.getElementById('setAddress').value,
    contact: document.getElementById('setContact').value,
    email: document.getElementById('setEmail').value,
    gstin: document.getElementById('setGstin').value,
    stateCode: document.getElementById('setState').value,
    pan: document.getElementById('setPan').value,
    gstRate: parseFloat(document.getElementById('setGstRate').value)||18,
    prefix: document.getElementById('setPrefix').value,
    nextNum: parseInt(document.getElementById('setNextNum').value)||1,
    signatureImage: settings.signatureImage
  };
  LS.set('sss_settings', settings);
  toast('Settings saved');
});

document.getElementById('exportBtn').addEventListener('click', ()=>{
  const data = { settings, overrides, customParts, invoices, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sss-invoice-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
});

document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(data.settings) settings = data.settings;
      if(data.overrides) overrides = data.overrides;
      if(data.customParts) customParts = data.customParts;
      if(data.invoices) invoices = data.invoices;
      LS.set('sss_settings', settings); LS.set('sss_price_overrides', overrides);
      LS.set('sss_custom_parts', customParts); LS.set('sss_invoices', invoices);
      refreshParts(); renderPartList(); loadSettingsForm();
      toast('Data restored');
    }catch(err){ alert('Error reading file.'); }
  };
  reader.readAsText(file);
});

/* ===================== Init ===================== */
renderPartList();
resetInvoiceForm();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
